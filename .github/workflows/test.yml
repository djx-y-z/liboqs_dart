# Run Dart tests for liboqs_dart
#
# Trigger:
# - Push to main when library files change
# - After native library build completes
# - Manual dispatch

name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  workflow_run:
    workflows: ["Build liboqs Native Libraries"]
    types: [completed]
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest  # Native libraries are pre-built in bin/
    # Skip if triggered by failed build workflow
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install FVM
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Cache FVM
        uses: actions/cache@v4
        with:
          path: ~/.fvm
          key: fvm-${{ runner.os }}-${{ hashFiles('.fvmrc') }}
          restore-keys: |
            fvm-${{ runner.os }}-

      - name: Install Flutter via FVM
        run: fvm install

      - name: Install dependencies
        run: make get

      - name: Analyze code
        run: make analyze --fatal-infos

      - name: Run tests
        run: make test

      - name: Check formatting
        run: make format-check
