# Build liboqs native libraries for all platforms
#
# This workflow uses cross-platform Dart scripts from scripts/ directory.
# The same scripts can be run locally on any OS with Dart SDK.
#
# Platforms:
# - Linux x86_64
# - macOS Universal (arm64 + x86_64)
# - iOS XCFramework (device arm64 + simulator arm64/x86_64)
# - Android (arm64-v8a, armeabi-v7a, x86_64)
# - Windows x86_64
#
# Trigger:
# - Manual dispatch (workflow_dispatch)
# - Push to main when LIBOQS_VERSION file changes
# - New tags matching 'v*' or 'liboqs-*'
#
# Version is read from LIBOQS_VERSION file in repository root

name: Build liboqs Native Libraries

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'LIBOQS_VERSION'
    tags:
      - 'v*'
      - 'liboqs-*'

jobs:
  # ============================================
  # Read version from file
  # ============================================
  read-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read liboqs version
        id: version
        run: |
          VERSION=$(cat LIBOQS_VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building liboqs version: $VERSION"

  # ============================================
  # Linux x86_64
  # ============================================
  build-linux:
    needs: read-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install FVM
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Cache FVM
        uses: actions/cache@v4
        with:
          path: ~/.fvm
          key: fvm-${{ runner.os }}-${{ hashFiles('.fvmrc') }}
          restore-keys: |
            fvm-${{ runner.os }}-

      - name: Install Flutter via FVM
        run: fvm install

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc g++

      - name: Build liboqs for Linux
        run: make build ARGS="linux"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-linux-x86_64
          path: bin/linux/liboqs.so

  # ============================================
  # macOS (arm64 + x86_64 on separate runners)
  # ============================================
  build-macos:
    needs: read-version
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install FVM
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Cache FVM
        uses: actions/cache@v4
        with:
          path: ~/.fvm
          key: fvm-${{ runner.os }}-${{ hashFiles('.fvmrc') }}
          restore-keys: |
            fvm-${{ runner.os }}-

      - name: Install Flutter via FVM
        run: fvm install

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Build liboqs for macOS ${{ matrix.arch }}
        run: make build ARGS="macos --arch ${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-macos-${{ matrix.arch }}
          path: bin/macos/liboqs.dylib

  # ============================================
  # iOS (device + simulator on separate runners)
  # ============================================
  build-ios:
    needs: read-version
    strategy:
      matrix:
        include:
          - target: device
            arch: arm64
            runner: macos-latest
            dart_target: device
          - target: simulator
            arch: arm64
            runner: macos-latest
            dart_target: simulator-arm64
          - target: simulator
            arch: x86_64
            runner: macos-13
            dart_target: simulator-x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install FVM
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Cache FVM
        uses: actions/cache@v4
        with:
          path: ~/.fvm
          key: fvm-${{ runner.os }}-${{ hashFiles('.fvmrc') }}
          restore-keys: |
            fvm-${{ runner.os }}-

      - name: Install Flutter via FVM
        run: fvm install

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Build liboqs for iOS ${{ matrix.target }} ${{ matrix.arch }}
        run: make build ARGS="ios --target ${{ matrix.dart_target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-ios-${{ matrix.target }}-${{ matrix.arch }}
          path: ios/Libraries/${{ matrix.target }}-${{ matrix.arch }}/liboqs.a

  # ============================================
  # Android (all architectures)
  # ============================================
  build-android:
    needs: read-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install FVM
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Cache FVM
        uses: actions/cache@v4
        with:
          path: ~/.fvm
          key: fvm-${{ runner.os }}-${{ hashFiles('.fvmrc') }}
          restore-keys: |
            fvm-${{ runner.os }}-

      - name: Install Flutter via FVM
        run: fvm install

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Build liboqs for Android ${{ matrix.abi }}
        run: make build ARGS="android --abi ${{ matrix.abi }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-android-${{ matrix.abi }}
          path: android/src/main/jniLibs/${{ matrix.abi }}/liboqs.so

  # ============================================
  # Windows x86_64
  # ============================================
  build-windows:
    needs: read-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install FVM
        run: |
          dart pub global activate fvm
          echo "$env:LOCALAPPDATA\Pub\Cache\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Cache FVM
        uses: actions/cache@v4
        with:
          path: ~/.fvm
          key: fvm-${{ runner.os }}-${{ hashFiles('.fvmrc') }}
          restore-keys: |
            fvm-${{ runner.os }}-

      - name: Install Flutter via FVM
        run: fvm install

      - name: Install dependencies
        run: choco install ninja make -y

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build liboqs for Windows
        run: make build ARGS="windows"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-windows-x86_64
          path: bin/windows/oqs.dll

  # ============================================
  # Combine all artifacts and commit
  # ============================================
  commit-binaries:
    needs: [read-version, build-linux, build-macos, build-ios, build-android, build-windows]
    runs-on: macos-latest  # Need macOS for lipo and xcodebuild
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install FVM
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Cache FVM
        uses: actions/cache@v4
        with:
          path: ~/.fvm
          key: fvm-${{ runner.os }}-${{ hashFiles('.fvmrc') }}
          restore-keys: |
            fvm-${{ runner.os }}-

      - name: Install Flutter via FVM
        run: fvm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -exec ls -lh {} \;

      - name: Combine artifacts using Dart script
        run: make combine ARGS="--artifacts-dir artifacts"

      # ============================================
      # Regenerate Dart FFI bindings
      # ============================================
      - name: Install build dependencies
        run: |
          brew list cmake &>/dev/null || brew install cmake
          brew list ninja &>/dev/null || brew install ninja

      - name: Regenerate Dart FFI bindings
        id: regenerate_bindings
        run: |
          echo "=== Regenerating Dart FFI bindings for liboqs ${{ env.LIBOQS_VERSION }} ==="

          make get

          if make regen; then
            echo "bindings_updated=true" >> $GITHUB_OUTPUT
            echo "Bindings regenerated successfully"
          else
            echo "bindings_updated=false" >> $GITHUB_OUTPUT
            echo "::warning::Bindings regeneration failed, but continuing with build"
          fi

          if git diff --quiet lib/src/bindings/; then
            echo "bindings_changed=false" >> $GITHUB_OUTPUT
            echo "No changes in bindings"
          else
            echo "bindings_changed=true" >> $GITHUB_OUTPUT
            echo "Bindings have changes:"
            git diff --stat lib/src/bindings/
          fi

      - name: Run quick tests
        if: steps.regenerate_bindings.outputs.bindings_updated == 'true'
        continue-on-error: true
        run: |
          echo "=== Running quick tests to verify bindings ==="
          make test ARGS="test/quick_test.dart" || echo "::warning::Quick tests failed"

      - name: Commit binaries and bindings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add native libraries
          git add bin/ macos/Libraries/ ios/Frameworks/ android/src/main/jniLibs/

          # Add regenerated bindings (if changed)
          git add lib/src/bindings/ headers/

          # Determine what changed for commit message
          BINDINGS_CHANGED="${{ steps.regenerate_bindings.outputs.bindings_changed }}"
          if [ "$BINDINGS_CHANGED" = "true" ]; then
            BINDINGS_NOTE="- Dart FFI bindings regenerated"
          else
            BINDINGS_NOTE="- Dart FFI bindings unchanged"
          fi

          git commit -m "Build liboqs ${{ env.LIBOQS_VERSION }} native libraries

          Server (bin/):
          - Linux x86_64
          - macOS Universal (arm64 + x86_64)
          - Windows x86_64

          Flutter:
          - iOS XCFramework with STATIC libraries (device + simulator)
          - Android (arm64-v8a, armeabi-v7a, x86_64)
          - macOS (copy from bin/)

          Bindings:
          $BINDINGS_NOTE

          Built by GitHub Actions using cross-platform Dart scripts" || echo "No changes to commit"
          git push

      # ============================================
      # Create Release Archives for Build Hooks
      # ============================================
      - name: Create release archives
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${{ env.LIBOQS_VERSION }}
          mkdir -p release-archives

          echo "=== Creating release archives for Build Hooks ==="

          # Linux x86_64
          tar -czvf release-archives/liboqs-${VERSION}-linux-x86_64.tar.gz \
            -C bin/linux liboqs.so

          # macOS Universal
          tar -czvf release-archives/liboqs-${VERSION}-macos-universal.tar.gz \
            -C bin/macos liboqs.dylib

          # Windows x86_64 (zip format)
          cd bin/windows && zip ../../release-archives/liboqs-${VERSION}-windows-x86_64.zip oqs.dll && cd ../..

          # Android ABIs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            tar -czvf release-archives/liboqs-${VERSION}-android-${abi}.tar.gz \
              -C android/src/main/jniLibs/${abi} liboqs.so
          done

          # iOS device (static library)
          tar -czvf release-archives/liboqs-${VERSION}-ios-device.tar.gz \
            -C ios/Frameworks/liboqs.xcframework/ios-arm64 liboqs.a

          # iOS simulator (fat static library)
          tar -czvf release-archives/liboqs-${VERSION}-ios-simulator.tar.gz \
            -C ios/Frameworks/liboqs.xcframework/ios-arm64_x86_64-simulator liboqs.a

          # Generate SHA256 checksums
          cd release-archives
          sha256sum liboqs-${VERSION}-*.* > liboqs-${VERSION}-checksums.sha256
          cd ..

          echo "=== Release archives created ==="
          ls -lh release-archives/

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-archives/liboqs-${{ env.LIBOQS_VERSION }}-linux-x86_64.tar.gz
            release-archives/liboqs-${{ env.LIBOQS_VERSION }}-macos-universal.tar.gz
            release-archives/liboqs-${{ env.LIBOQS_VERSION }}-windows-x86_64.zip
            release-archives/liboqs-${{ env.LIBOQS_VERSION }}-android-arm64-v8a.tar.gz
            release-archives/liboqs-${{ env.LIBOQS_VERSION }}-android-armeabi-v7a.tar.gz
            release-archives/liboqs-${{ env.LIBOQS_VERSION }}-android-x86_64.tar.gz
            release-archives/liboqs-${{ env.LIBOQS_VERSION }}-ios-device.tar.gz
            release-archives/liboqs-${{ env.LIBOQS_VERSION }}-ios-simulator.tar.gz
            release-archives/liboqs-${{ env.LIBOQS_VERSION }}-checksums.sha256
          body: |
            ## liboqs ${{ env.LIBOQS_VERSION }} Native Libraries

            Pre-built native libraries for all supported platforms.
            **These archives are downloaded automatically by Dart Build Hooks.**

            ### Archive Format
            Archives are named: `liboqs-{version}-{os}-{arch}.tar.gz` (or `.zip` for Windows)

            | Platform | Architecture | Archive |
            |----------|--------------|---------|
            | Linux | x86_64 | `liboqs-${{ env.LIBOQS_VERSION }}-linux-x86_64.tar.gz` |
            | macOS | Universal | `liboqs-${{ env.LIBOQS_VERSION }}-macos-universal.tar.gz` |
            | Windows | x86_64 | `liboqs-${{ env.LIBOQS_VERSION }}-windows-x86_64.zip` |
            | Android | arm64-v8a | `liboqs-${{ env.LIBOQS_VERSION }}-android-arm64-v8a.tar.gz` |
            | Android | armeabi-v7a | `liboqs-${{ env.LIBOQS_VERSION }}-android-armeabi-v7a.tar.gz` |
            | Android | x86_64 | `liboqs-${{ env.LIBOQS_VERSION }}-android-x86_64.tar.gz` |
            | iOS | device (arm64) | `liboqs-${{ env.LIBOQS_VERSION }}-ios-device.tar.gz` |
            | iOS | simulator | `liboqs-${{ env.LIBOQS_VERSION }}-ios-simulator.tar.gz` |

            ### Checksums
            SHA256 checksums are available in `liboqs-${{ env.LIBOQS_VERSION }}-checksums.sha256`

            ### Usage with Build Hooks
            Add `liboqs` to your `pubspec.yaml` dependencies. Build hooks will
            automatically download the correct native library during build.

            ```yaml
            dependencies:
              liboqs: ^1.0.0
            ```

            ### Manual Download (for development)
            If you need to download manually:
            ```bash
            # Example for macOS
            curl -L -o liboqs.tar.gz \
              https://github.com/${{ github.repository }}/releases/download/v${{ env.LIBOQS_VERSION }}/liboqs-${{ env.LIBOQS_VERSION }}-macos-universal.tar.gz
            tar -xzf liboqs.tar.gz
            ```
