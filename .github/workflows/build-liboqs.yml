# Build liboqs native libraries for all platforms
#
# Platforms:
# - Linux x86_64
# - macOS Universal (arm64 + x86_64)
# - iOS XCFramework (device arm64 + simulator arm64/x86_64)
# - Android (arm64-v8a, armeabi-v7a, x86_64)
# - Windows x86_64
#
# Trigger:
# - Manual dispatch (workflow_dispatch)
# - Push to main when LIBOQS_VERSION file changes
# - New tags matching 'v*' or 'liboqs-*'
#
# Version is read from LIBOQS_VERSION file in repository root

name: Build liboqs Native Libraries

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'LIBOQS_VERSION'
    tags:
      - 'v*'
      - 'liboqs-*'

jobs:
  # ============================================
  # Read version from file
  # ============================================
  read-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read liboqs version
        id: version
        run: |
          VERSION=$(cat LIBOQS_VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building liboqs version: $VERSION"

  # ============================================
  # Linux x86_64
  # ============================================
  build-linux:
    needs: read-version
    runs-on: ubuntu-latest
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc g++

      - name: Clone liboqs
        run: |
          git clone --depth 1 --branch ${{ env.LIBOQS_VERSION }} \
            https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs

      - name: Build liboqs
        run: |
          mkdir -p /tmp/liboqs/build
          cd /tmp/liboqs/build
          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_USE_OPENSSL=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          ninja

      - name: Copy library
        run: |
          mkdir -p bin/linux
          cp /tmp/liboqs/build/lib/liboqs.so bin/linux/
          ls -la bin/linux/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-linux-x86_64
          path: bin/linux/liboqs.so

  # ============================================
  # macOS (arm64 + x86_64)
  # ============================================
  build-macos:
    needs: read-version
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
            deployment_target: "11.0"
          - arch: x86_64
            runner: macos-13
            deployment_target: "10.15"
    runs-on: ${{ matrix.runner }}
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Clone liboqs
        run: |
          git clone --depth 1 --branch ${{ env.LIBOQS_VERSION }} \
            https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs

      - name: Build liboqs for macOS ${{ matrix.arch }}
        run: |
          mkdir -p /tmp/liboqs/build
          cd /tmp/liboqs/build
          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_USE_OPENSSL=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${{ matrix.deployment_target }}" \
            -G Ninja
          ninja

      - name: Copy library
        run: |
          mkdir -p bin/macos-${{ matrix.arch }}
          cp /tmp/liboqs/build/lib/liboqs.dylib bin/macos-${{ matrix.arch }}/liboqs.dylib
          ls -la bin/macos-${{ matrix.arch }}/
          file bin/macos-${{ matrix.arch }}/liboqs.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-macos-${{ matrix.arch }}
          path: bin/macos-${{ matrix.arch }}/liboqs.dylib

  # ============================================
  # iOS (device + simulator) - STATIC LIBRARIES
  # iOS apps cannot load arbitrary dylibs, must use static linking
  # ============================================
  build-ios:
    needs: read-version
    strategy:
      matrix:
        include:
          - target: device
            arch: arm64
            runner: macos-latest
            sdk: iphoneos
            processor: aarch64
          - target: simulator
            arch: arm64
            runner: macos-latest
            sdk: iphonesimulator
            processor: aarch64
          - target: simulator
            arch: x86_64
            runner: macos-13
            sdk: iphonesimulator
            processor: x86_64
    runs-on: ${{ matrix.runner }}
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Clone liboqs
        run: |
          git clone --depth 1 --branch ${{ env.LIBOQS_VERSION }} \
            https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs

      - name: Get iOS SDK path
        id: ios-sdk
        run: |
          SDK_PATH=$(xcrun --sdk ${{ matrix.sdk }} --show-sdk-path)
          echo "sdk_path=$SDK_PATH" >> $GITHUB_OUTPUT
          echo "iOS SDK (${{ matrix.sdk }}): $SDK_PATH"

      - name: Build liboqs STATIC for iOS ${{ matrix.target }} ${{ matrix.arch }}
        run: |
          mkdir -p /tmp/liboqs/build
          cd /tmp/liboqs/build
          cmake .. \
            -DBUILD_SHARED_LIBS=OFF \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_USE_OPENSSL=OFF \
            -DOQS_PERMIT_UNSUPPORTED_ARCHITECTURE=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.processor }} \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="12.0" \
            -DCMAKE_OSX_SYSROOT="${{ steps.ios-sdk.outputs.sdk_path }}" \
            -G Ninja
          ninja

      - name: Copy static library
        run: |
          mkdir -p bin/ios-${{ matrix.target }}-${{ matrix.arch }}
          cp /tmp/liboqs/build/lib/liboqs.a bin/ios-${{ matrix.target }}-${{ matrix.arch }}/liboqs.a
          ls -la bin/ios-${{ matrix.target }}-${{ matrix.arch }}/
          file bin/ios-${{ matrix.target }}-${{ matrix.arch }}/liboqs.a

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-ios-${{ matrix.target }}-${{ matrix.arch }}
          path: bin/ios-${{ matrix.target }}-${{ matrix.arch }}/liboqs.a

  # ============================================
  # Android (all architectures)
  # ============================================
  build-android:
    needs: read-version
    runs-on: ubuntu-latest
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Clone liboqs
        run: |
          git clone --depth 1 --branch ${{ env.LIBOQS_VERSION }} \
            https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs

      - name: Build liboqs for Android ${{ matrix.abi }}
        run: |
          mkdir -p /tmp/liboqs/build
          cd /tmp/liboqs/build
          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_USE_OPENSSL=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_shared \
            -G Ninja
          ninja

      - name: Copy library
        run: |
          mkdir -p bin/android/${{ matrix.abi }}
          cp /tmp/liboqs/build/lib/liboqs.so bin/android/${{ matrix.abi }}/
          ls -la bin/android/${{ matrix.abi }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-android-${{ matrix.abi }}
          path: bin/android/${{ matrix.abi }}/liboqs.so

  # ============================================
  # Windows x86_64
  # ============================================
  build-windows:
    needs: read-version
    runs-on: windows-latest
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: choco install ninja -y

      - name: Clone liboqs
        run: |
          git clone --depth 1 --branch ${{ env.LIBOQS_VERSION }} `
            https://github.com/open-quantum-safe/liboqs.git C:\liboqs

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build liboqs
        run: |
          mkdir C:\liboqs\build
          cd C:\liboqs\build
          cmake .. `
            -DBUILD_SHARED_LIBS=ON `
            -DOQS_BUILD_ONLY_LIB=ON `
            -DOQS_USE_OPENSSL=OFF `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON `
            -G Ninja
          ninja

      - name: Find and copy library
        run: |
          echo "=== Searching for built files ==="
          Get-ChildItem -Path C:\liboqs\build -Recurse -Include *.dll,*.lib | ForEach-Object { $_.FullName }

          New-Item -ItemType Directory -Force -Path bin\windows

          # Find the DLL wherever it was placed
          $dll = Get-ChildItem -Path C:\liboqs\build -Recurse -Filter "oqs.dll" | Select-Object -First 1
          if ($dll) {
            Copy-Item $dll.FullName -Destination bin\windows\oqs.dll
            echo "Copied from: $($dll.FullName)"
          } else {
            echo "ERROR: oqs.dll not found in build directory"
            exit 1
          }

          dir bin\windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-windows-x86_64
          path: bin/windows/oqs.dll

  # ============================================
  # Combine all artifacts and commit
  # ============================================
  commit-binaries:
    needs: [read-version, build-linux, build-macos, build-ios, build-android, build-windows]
    runs-on: macos-latest  # Need macOS for lipo and xcodebuild
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -exec ls -lh {} \;

      - name: Clean old binaries
        run: |
          echo "=== Removing old binaries ==="
          # Server binaries
          rm -rf bin/
          # Flutter platform binaries
          rm -rf macos/Libraries/
          rm -rf ios/Frameworks/
          rm -rf ios/Libraries/
          rm -rf android/src/main/jniLibs/
          echo "Done"

      - name: Create server binaries (bin/)
        run: |
          # Create directories for server platforms only
          mkdir -p bin/{linux,macos,windows}

          # Linux
          cp artifacts/liboqs-linux-x86_64/liboqs.so bin/linux/

          # macOS Universal Binary
          lipo -create \
            artifacts/liboqs-macos-arm64/liboqs.dylib \
            artifacts/liboqs-macos-x86_64/liboqs.dylib \
            -output bin/macos/liboqs.dylib
          # Fix install name (liboqs.9.dylib -> liboqs.dylib)
          install_name_tool -id "@rpath/liboqs.dylib" bin/macos/liboqs.dylib

          # Windows
          cp artifacts/liboqs-windows-x86_64/oqs.dll bin/windows/

          echo "=== Server binaries (bin/) ==="
          find bin -type f -exec ls -lh {} \;
          echo "=== macOS Universal Binary ==="
          lipo -info bin/macos/liboqs.dylib
          otool -L bin/macos/liboqs.dylib | head -2

      - name: Create iOS XCFramework with static libraries (ios/Frameworks/)
        run: |
          # Create iOS Simulator universal static library (temp)
          mkdir -p tmp/ios-simulator
          lipo -create \
            artifacts/liboqs-ios-simulator-arm64/liboqs.a \
            artifacts/liboqs-ios-simulator-x86_64/liboqs.a \
            -output tmp/ios-simulator/liboqs.a

          # Create XCFramework with static libraries
          mkdir -p ios/Frameworks
          xcodebuild -create-xcframework \
            -library artifacts/liboqs-ios-device-arm64/liboqs.a \
            -library tmp/ios-simulator/liboqs.a \
            -output ios/Frameworks/liboqs.xcframework

          echo "=== iOS XCFramework (static) ==="
          find ios/Frameworks/liboqs.xcframework -name "*.a" -exec file {} \;
          cat ios/Frameworks/liboqs.xcframework/Info.plist

      - name: Create Android libraries (android/src/main/jniLibs/)
        run: |
          mkdir -p android/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86_64}

          cp artifacts/liboqs-android-arm64-v8a/liboqs.so android/src/main/jniLibs/arm64-v8a/
          cp artifacts/liboqs-android-armeabi-v7a/liboqs.so android/src/main/jniLibs/armeabi-v7a/
          cp artifacts/liboqs-android-x86_64/liboqs.so android/src/main/jniLibs/x86_64/

          echo "=== Android libraries ==="
          find android/src/main/jniLibs -type f -exec ls -lh {} \;

      - name: Copy macOS library to plugin directory
        run: |
          # macOS needs copy in both bin/ (server) and macos/Libraries/ (Flutter)
          mkdir -p macos/Libraries
          cp bin/macos/liboqs.dylib macos/Libraries/
          echo "=== macOS plugin library ==="
          file macos/Libraries/liboqs.dylib

      - name: Create version file
        run: |
          echo "liboqs_version: ${{ env.LIBOQS_VERSION }}" > bin/VERSION
          echo "build_date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> bin/VERSION
          echo "commit: ${{ github.sha }}" >> bin/VERSION
          cat bin/VERSION

      - name: Commit binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/ macos/Libraries/ ios/Frameworks/ android/src/main/jniLibs/
          git commit -m "Build liboqs ${{ env.LIBOQS_VERSION }} native libraries

          Server (bin/):
          - Linux x86_64
          - macOS Universal (arm64 + x86_64)
          - Windows x86_64

          Flutter:
          - iOS XCFramework with STATIC libraries (device + simulator)
          - Android (arm64-v8a, armeabi-v7a, x86_64)
          - macOS (copy from bin/)

          Built by GitHub Actions" || echo "No changes to commit"
          git push

      - name: Package iOS XCFramework for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd ios/Frameworks
          zip -r liboqs.xcframework.zip liboqs.xcframework
          ls -la

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin/linux/liboqs.so
            bin/macos/liboqs.dylib
            bin/windows/oqs.dll
            ios/Frameworks/liboqs.xcframework.zip
            android/src/main/jniLibs/arm64-v8a/liboqs.so
            android/src/main/jniLibs/armeabi-v7a/liboqs.so
            android/src/main/jniLibs/x86_64/liboqs.so
          body: |
            ## liboqs ${{ env.LIBOQS_VERSION }} Native Libraries

            Pre-built native libraries for all supported platforms.

            ### Server (Dart CLI)
            | Platform | Architecture | File |
            |----------|--------------|------|
            | Linux | x86_64 | `liboqs.so` |
            | macOS | Universal (arm64 + x86_64) | `liboqs.dylib` |
            | Windows | x86_64 | `oqs.dll` |

            ### Flutter
            | Platform | Architecture | File |
            |----------|--------------|------|
            | iOS | XCFramework (static, device + simulator) | `liboqs.xcframework.zip` |
            | Android | arm64-v8a, armeabi-v7a, x86_64 | `liboqs.so` |

            ### Usage
            - **Server**: Place library in `bin/{platform}/`
            - **Flutter iOS**: Extract XCFramework to `ios/Frameworks/`
            - **Flutter Android**: Place in `android/src/main/jniLibs/{abi}/`
