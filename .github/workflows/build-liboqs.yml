# Build liboqs native libraries for all platforms
#
# Platforms:
# - Linux x86_64
# - macOS Universal (arm64 + x86_64)
# - iOS XCFramework (device arm64 + simulator arm64/x86_64)
# - Android (arm64-v8a, armeabi-v7a, x86_64)
# - Windows x86_64
#
# Trigger:
# - Manual dispatch (workflow_dispatch)
# - Push to main when LIBOQS_VERSION file changes
# - New tags matching 'v*' or 'liboqs-*'
#
# Version is read from LIBOQS_VERSION file in repository root

name: Build liboqs Native Libraries

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'LIBOQS_VERSION'
    tags:
      - 'v*'
      - 'liboqs-*'

jobs:
  # ============================================
  # Read version from file
  # ============================================
  read-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read liboqs version
        id: version
        run: |
          VERSION=$(cat LIBOQS_VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building liboqs version: $VERSION"

  # ============================================
  # Linux x86_64
  # ============================================
  build-linux:
    needs: read-version
    runs-on: ubuntu-latest
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc g++

      - name: Clone liboqs
        run: |
          git clone --depth 1 --branch ${{ env.LIBOQS_VERSION }} \
            https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs

      - name: Build liboqs
        run: |
          mkdir -p /tmp/liboqs/build
          cd /tmp/liboqs/build
          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_USE_OPENSSL=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          ninja

      - name: Copy library
        run: |
          mkdir -p bin/linux
          cp /tmp/liboqs/build/lib/liboqs.so bin/linux/
          ls -la bin/linux/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-linux-x86_64
          path: bin/linux/liboqs.so

  # ============================================
  # macOS arm64 (Apple Silicon)
  # ============================================
  build-macos-arm64:
    needs: read-version
    runs-on: macos-latest
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Clone liboqs
        run: |
          git clone --depth 1 --branch ${{ env.LIBOQS_VERSION }} \
            https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs

      - name: Build liboqs
        run: |
          mkdir -p /tmp/liboqs/build
          cd /tmp/liboqs/build
          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_USE_OPENSSL=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
            -G Ninja
          ninja

      - name: Copy library
        run: |
          mkdir -p bin/macos
          cp /tmp/liboqs/build/lib/liboqs.dylib bin/macos/liboqs.dylib
          ls -la bin/macos/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-macos-arm64
          path: bin/macos/liboqs.dylib

  # ============================================
  # macOS x86_64 (Intel)
  # ============================================
  build-macos-x86_64:
    needs: read-version
    runs-on: macos-13  # Intel runner
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Clone liboqs
        run: |
          git clone --depth 1 --branch ${{ env.LIBOQS_VERSION }} \
            https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs

      - name: Build liboqs
        run: |
          mkdir -p /tmp/liboqs/build
          cd /tmp/liboqs/build
          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_USE_OPENSSL=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="10.15" \
            -G Ninja
          ninja

      - name: Copy library
        run: |
          mkdir -p bin/macos-x86_64
          cp /tmp/liboqs/build/lib/liboqs.dylib bin/macos-x86_64/liboqs.dylib
          ls -la bin/macos-x86_64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-macos-x86_64
          path: bin/macos-x86_64/liboqs.dylib

  # ============================================
  # iOS arm64
  # ============================================
  build-ios:
    needs: read-version
    runs-on: macos-latest
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Clone liboqs
        run: |
          git clone --depth 1 --branch ${{ env.LIBOQS_VERSION }} \
            https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs

      - name: Get iOS SDK path
        id: ios-sdk
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "sdk_path=$SDK_PATH" >> $GITHUB_OUTPUT
          echo "iOS SDK: $SDK_PATH"

      - name: Build liboqs for iOS
        run: |
          mkdir -p /tmp/liboqs/build
          cd /tmp/liboqs/build
          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_USE_OPENSSL=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="12.0" \
            -DCMAKE_OSX_SYSROOT="${{ steps.ios-sdk.outputs.sdk_path }}" \
            -DCMAKE_C_FLAGS="-fembed-bitcode" \
            -G Ninja
          ninja

      - name: Fix install name and copy
        run: |
          mkdir -p bin/ios
          cp /tmp/liboqs/build/lib/liboqs.dylib bin/ios/liboqs.dylib
          install_name_tool -id "@rpath/liboqs.dylib" bin/ios/liboqs.dylib
          ls -la bin/ios/
          # Verify it's built for iOS
          file bin/ios/liboqs.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-ios-device
          path: bin/ios/liboqs.dylib

  # ============================================
  # iOS Simulator arm64 (Apple Silicon Mac)
  # ============================================
  build-ios-simulator-arm64:
    needs: read-version
    runs-on: macos-latest
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Clone liboqs
        run: |
          git clone --depth 1 --branch ${{ env.LIBOQS_VERSION }} \
            https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs

      - name: Get iOS Simulator SDK path
        id: ios-sim-sdk
        run: |
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          echo "sdk_path=$SDK_PATH" >> $GITHUB_OUTPUT
          echo "iOS Simulator SDK: $SDK_PATH"

      - name: Build liboqs for iOS Simulator arm64
        run: |
          mkdir -p /tmp/liboqs/build
          cd /tmp/liboqs/build
          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_USE_OPENSSL=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="12.0" \
            -DCMAKE_OSX_SYSROOT="${{ steps.ios-sim-sdk.outputs.sdk_path }}" \
            -G Ninja
          ninja

      - name: Fix install name and copy
        run: |
          mkdir -p bin/ios-simulator-arm64
          cp /tmp/liboqs/build/lib/liboqs.dylib bin/ios-simulator-arm64/liboqs.dylib
          install_name_tool -id "@rpath/liboqs.dylib" bin/ios-simulator-arm64/liboqs.dylib
          ls -la bin/ios-simulator-arm64/
          file bin/ios-simulator-arm64/liboqs.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-ios-simulator-arm64
          path: bin/ios-simulator-arm64/liboqs.dylib

  # ============================================
  # iOS Simulator x86_64 (Intel Mac)
  # ============================================
  build-ios-simulator-x86_64:
    needs: read-version
    runs-on: macos-13  # Intel runner
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Clone liboqs
        run: |
          git clone --depth 1 --branch ${{ env.LIBOQS_VERSION }} \
            https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs

      - name: Get iOS Simulator SDK path
        id: ios-sim-sdk
        run: |
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          echo "sdk_path=$SDK_PATH" >> $GITHUB_OUTPUT
          echo "iOS Simulator SDK: $SDK_PATH"

      - name: Build liboqs for iOS Simulator x86_64
        run: |
          mkdir -p /tmp/liboqs/build
          cd /tmp/liboqs/build
          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_USE_OPENSSL=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_SYSTEM_PROCESSOR=x86_64 \
            -DCMAKE_OSX_ARCHITECTURES="x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="12.0" \
            -DCMAKE_OSX_SYSROOT="${{ steps.ios-sim-sdk.outputs.sdk_path }}" \
            -G Ninja
          ninja

      - name: Fix install name and copy
        run: |
          mkdir -p bin/ios-simulator-x86_64
          cp /tmp/liboqs/build/lib/liboqs.dylib bin/ios-simulator-x86_64/liboqs.dylib
          install_name_tool -id "@rpath/liboqs.dylib" bin/ios-simulator-x86_64/liboqs.dylib
          ls -la bin/ios-simulator-x86_64/
          file bin/ios-simulator-x86_64/liboqs.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-ios-simulator-x86_64
          path: bin/ios-simulator-x86_64/liboqs.dylib

  # ============================================
  # Android (all architectures)
  # ============================================
  build-android:
    needs: read-version
    runs-on: ubuntu-latest
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Clone liboqs
        run: |
          git clone --depth 1 --branch ${{ env.LIBOQS_VERSION }} \
            https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs

      - name: Build liboqs for Android ${{ matrix.abi }}
        run: |
          mkdir -p /tmp/liboqs/build
          cd /tmp/liboqs/build
          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_USE_OPENSSL=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_shared \
            -G Ninja
          ninja

      - name: Copy library
        run: |
          mkdir -p bin/android/${{ matrix.abi }}
          cp /tmp/liboqs/build/lib/liboqs.so bin/android/${{ matrix.abi }}/
          ls -la bin/android/${{ matrix.abi }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-android-${{ matrix.abi }}
          path: bin/android/${{ matrix.abi }}/liboqs.so

  # ============================================
  # Windows x86_64
  # ============================================
  build-windows:
    needs: read-version
    runs-on: windows-latest
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: choco install ninja -y

      - name: Clone liboqs
        run: |
          git clone --depth 1 --branch ${{ env.LIBOQS_VERSION }} `
            https://github.com/open-quantum-safe/liboqs.git C:\liboqs

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build liboqs
        run: |
          mkdir C:\liboqs\build
          cd C:\liboqs\build
          cmake .. `
            -DBUILD_SHARED_LIBS=ON `
            -DOQS_BUILD_ONLY_LIB=ON `
            -DOQS_USE_OPENSSL=OFF `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON `
            -G Ninja
          ninja

      - name: Find and copy library
        run: |
          echo "=== Searching for built files ==="
          Get-ChildItem -Path C:\liboqs\build -Recurse -Include *.dll,*.lib | ForEach-Object { $_.FullName }

          New-Item -ItemType Directory -Force -Path bin\windows

          # Find the DLL wherever it was placed
          $dll = Get-ChildItem -Path C:\liboqs\build -Recurse -Filter "oqs.dll" | Select-Object -First 1
          if ($dll) {
            Copy-Item $dll.FullName -Destination bin\windows\oqs.dll
            echo "Copied from: $($dll.FullName)"
          } else {
            echo "ERROR: oqs.dll not found in build directory"
            exit 1
          }

          dir bin\windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liboqs-windows-x86_64
          path: bin/windows/oqs.dll

  # ============================================
  # Combine all artifacts and commit
  # ============================================
  commit-binaries:
    needs: [read-version, build-linux, build-macos-arm64, build-macos-x86_64, build-ios, build-ios-simulator-arm64, build-ios-simulator-x86_64, build-android, build-windows]
    runs-on: macos-latest  # Need macOS for lipo and xcodebuild
    env:
      LIBOQS_VERSION: ${{ needs.read-version.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -exec ls -lh {} \;

      - name: Create macOS Universal Binary
        run: |
          mkdir -p bin/macos
          lipo -create \
            artifacts/liboqs-macos-arm64/liboqs.dylib \
            artifacts/liboqs-macos-x86_64/liboqs.dylib \
            -output bin/macos/liboqs.dylib
          echo "=== macOS Universal Binary ==="
          file bin/macos/liboqs.dylib
          lipo -info bin/macos/liboqs.dylib

      - name: Create iOS Simulator Universal Binary
        run: |
          mkdir -p tmp/ios-simulator
          lipo -create \
            artifacts/liboqs-ios-simulator-arm64/liboqs.dylib \
            artifacts/liboqs-ios-simulator-x86_64/liboqs.dylib \
            -output tmp/ios-simulator/liboqs.dylib
          # Fix install name for the fat binary
          install_name_tool -id "@rpath/liboqs.dylib" tmp/ios-simulator/liboqs.dylib
          echo "=== iOS Simulator Universal Binary ==="
          file tmp/ios-simulator/liboqs.dylib
          lipo -info tmp/ios-simulator/liboqs.dylib

      - name: Create iOS XCFramework
        run: |
          mkdir -p bin/ios
          xcodebuild -create-xcframework \
            -library artifacts/liboqs-ios-device/liboqs.dylib \
            -library tmp/ios-simulator/liboqs.dylib \
            -output bin/ios/liboqs.xcframework
          echo "=== iOS XCFramework ==="
          ls -la bin/ios/liboqs.xcframework/
          find bin/ios/liboqs.xcframework -name "*.dylib" -exec file {} \;

      - name: Organize remaining binaries
        run: |
          # Create bin directories
          mkdir -p bin/{linux,windows}
          mkdir -p bin/android/{arm64-v8a,armeabi-v7a,x86_64}

          # Copy artifacts
          cp artifacts/liboqs-linux-x86_64/liboqs.so bin/linux/
          cp artifacts/liboqs-android-arm64-v8a/liboqs.so bin/android/arm64-v8a/
          cp artifacts/liboqs-android-armeabi-v7a/liboqs.so bin/android/armeabi-v7a/
          cp artifacts/liboqs-android-x86_64/liboqs.so bin/android/x86_64/
          cp artifacts/liboqs-windows-x86_64/oqs.dll bin/windows/

          # Show results
          echo "=== All built libraries ==="
          find bin -type f \( -name "*.so" -o -name "*.dylib" -o -name "*.dll" \) -exec ls -lh {} \;
          echo "=== XCFramework structure ==="
          find bin/ios/liboqs.xcframework -type f

      - name: Copy libraries to platform plugin directories
        run: |
          # Copy macOS universal binary to plugin directory
          mkdir -p macos/Libraries
          cp bin/macos/liboqs.dylib macos/Libraries/
          echo "=== macOS plugin library ==="
          file macos/Libraries/liboqs.dylib

          # Copy iOS XCFramework to plugin directory
          mkdir -p ios/Frameworks
          cp -R bin/ios/liboqs.xcframework ios/Frameworks/
          echo "=== iOS plugin framework ==="
          ls -la ios/Frameworks/liboqs.xcframework/

      - name: Create version file
        run: |
          echo "liboqs_version: ${{ env.LIBOQS_VERSION }}" > bin/VERSION
          echo "build_date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> bin/VERSION
          echo "commit: ${{ github.sha }}" >> bin/VERSION
          cat bin/VERSION

      - name: Commit binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/ macos/Libraries/ ios/Frameworks/
          git commit -m "Build liboqs ${{ env.LIBOQS_VERSION }} native libraries

          Platforms:
          - Linux x86_64
          - macOS Universal (arm64 + x86_64)
          - iOS XCFramework (device arm64 + simulator arm64/x86_64)
          - Android arm64-v8a, armeabi-v7a, x86_64
          - Windows x86_64

          Built by GitHub Actions" || echo "No changes to commit"
          git push

      - name: Package XCFramework for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd bin/ios
          zip -r liboqs.xcframework.zip liboqs.xcframework
          ls -la

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin/linux/liboqs.so
            bin/macos/liboqs.dylib
            bin/ios/liboqs.xcframework.zip
            bin/android/arm64-v8a/liboqs.so
            bin/android/armeabi-v7a/liboqs.so
            bin/android/x86_64/liboqs.so
            bin/windows/oqs.dll
          body: |
            ## liboqs ${{ env.LIBOQS_VERSION }} Native Libraries

            Pre-built native libraries for all supported platforms.

            ### Platforms
            | Platform | Architecture | File |
            |----------|--------------|------|
            | Linux | x86_64 | `liboqs.so` |
            | macOS | Universal (arm64 + x86_64) | `liboqs.dylib` |
            | iOS | XCFramework (device + simulator) | `liboqs.xcframework.zip` |
            | Android | arm64-v8a | `liboqs.so` |
            | Android | armeabi-v7a | `liboqs.so` |
            | Android | x86_64 | `liboqs.so` |
            | Windows | x86_64 | `oqs.dll` |

            ### Usage
            - **macOS/Linux/Windows/Android**: Place the library in your project's `bin/` directory
            - **iOS**: Extract and place XCFramework in `ios/Frameworks/`
